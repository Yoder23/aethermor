[pytest]

# Root test path
testpaths =
    tests

# Python test file naming
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register custom markers
markers =
    novelty: marks tests that validate novelty-by-metric (morphogenesis, thermo-core, etc.)
    integration: integration-level tests
    regression: regression/golden-file tests
    performance: performance + memory tests
    benchmark: synthetic benchmark tests

# Ignore missing artifact warnings during collection
addopts =
    --disable-warnings
    --strict-markers

# Ensure benchmarks save consistently across OSes
filterwarnings =
    ignore::FutureWarning
